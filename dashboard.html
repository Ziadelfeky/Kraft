<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0b">
<title>KRAFT — Coach Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0a0b; --panel:#131316; --panel2:#17171b; --line:#232329;
    --gold:#d4e96c; --gold-soft:rgba(212,233,108,.10);
    --text:#f2f2f0; --muted:#87878f;
    --ok:#7fae7a; --warn:#c96f5e; --warn-soft:rgba(201,111,94,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(1100px 520px at 50% -8%, #16161a 0%, var(--bg) 60%) fixed, var(--bg);color:var(--text);font-family:'Poppins',sans-serif;font-size:14px;min-height:100dvh}
  .wordmark{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em;font-weight:600;letter-spacing:.35em;color:var(--gold);text-transform:uppercase}
  header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
  header .wordmark{font-size:1.05rem}
  header button{background:none;border:1px solid var(--line);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.78rem}
  main{max-width:960px;margin:0 auto;padding:22px 16px 60px}
  h2{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em;font-weight:500;font-size:1.05rem;color:var(--gold);margin:28px 0 12px;letter-spacing:.04em}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  /* login */
  .login-wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .login-wrap .wordmark{font-size:1.4rem;margin-bottom:34px}
  .login-card{width:100%;max-width:340px}
  input,select{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-family:inherit;font-size:.92rem;outline:none;margin-bottom:12px}
  input:focus,select:focus{border-color:var(--gold)}
  .btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--gold);color:#0a0a0b;font-family:inherit;font-weight:600;font-size:.95rem;cursor:pointer}
  .btn:disabled{opacity:.5}
  .btn-sm{width:auto;padding:7px 14px;font-size:.78rem}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .err{color:var(--warn);font-size:.85rem;min-height:1.2em;margin-top:8px}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .stat .n{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em;font-size:2rem;color:var(--gold);line-height:1.1}
  .stat .l{color:var(--muted);font-size:.72rem;letter-spacing:.06em;margin-top:4px}
  /* table */
  table{width:100%;border-collapse:collapse}
  th{color:var(--muted);font-weight:400;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.7rem;letter-spacing:.03em}
  .tag-debt{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(201,111,94,.35)}
  .tag-low{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(212,233,108,.35)}
  .tag-away{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .tag-home{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .remain{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em;font-size:1.05rem;color:var(--gold)}
  .remain.zero{color:var(--warn)}
  .muted{color:var(--muted);font-size:.8rem}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap}
  /* forms grid */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
  .form-grid .full{grid-column:1/-1}
  dialog{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:400px;width:92%}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  dialog h3{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em;font-weight:500;color:var(--gold);margin-bottom:16px}
  .hidden{display:none}
  .toolbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin:28px 0 12px;flex-wrap:wrap}
  .toolbar h2{margin:0}
  #search{max-width:220px;margin:0}
  @media (max-width:640px){
    .hide-sm{display:none}
    .stats{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="viewLogin">
  <img src="./logo.png" alt="KRAFT" style="height:36px;margin-bottom:34px">
  <div class="card login-card">
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="btnLogin">Sign in</button>
    <p class="err" id="loginErr"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="viewDash" class="hidden">
  <header>
    <span style="display:flex;align-items:center;gap:10px"><img src="./logo.png" alt="KRAFT" style="height:20px"><span class="wordmark" style="font-size:.8rem">COACH</span></span>
    <button id="btnLogout">Sign out</button>
  </header>
  <main>

    <div class="stats">
      <div class="stat"><div class="n" id="statToday">0</div><div class="l">CHECK-INS TODAY</div></div>
      <div class="stat"><div class="n" id="statDebt">0</div><div class="l">DEBT SESSIONS</div></div>
      <div class="stat"><div class="n" id="statLow">0</div><div class="l">LOW BALANCE</div></div>
    </div>

    <div id="pendingWrap" class="hidden">
      <h2>Pending approvals</h2>
      <div class="card">
        <table>
          <thead><tr><th>Name</th><th>Phone</th><th class="hide-sm">Requested</th><th></th></tr></thead>
          <tbody id="pendingBody"></tbody>
        </table>
      </div>
    </div>

    <h2>Today</h2>
    <div class="card" id="todayCard">
      <table>
        <thead><tr><th>Client</th><th>Time</th><th class="hide-sm">Method</th><th></th><th></th></tr></thead>
        <tbody id="todayBody"><tr><td colspan="5" class="muted">No check-ins yet today.</td></tr></tbody>
      </table>
    </div>

    <div class="toolbar">
      <h2>Clients</h2>
      <div style="display:flex;gap:8px">
        <input id="search" placeholder="Search name or phone">
        <button class="btn btn-sm" id="btnAddClient">+ Client</button>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Name</th><th>Left</th><th class="hide-sm">Last seen</th><th>Flags</th><th></th>
        </tr></thead>
        <tbody id="clientsBody"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- ADD CLIENT -->
<dialog id="dlgClient">
  <h3>New client</h3>
  <input id="cName" placeholder="Full name">
  <input id="cPhone" type="tel" placeholder="Phone (01XXXXXXXXX)" maxlength="11">
  <select id="cType"><option value="kraft">Kraft (QR check-in)</option><option value="home">Home training</option></select>
  <button class="btn" id="btnSaveClient">Save client</button>
  <button class="btn btn-ghost" style="margin-top:8px" onclick="dlgClient.close()">Cancel</button>
  <p class="err" id="clientErr"></p>
</dialog>

<!-- NEW PACKAGE + PAYMENT -->
<dialog id="dlgPkg">
  <h3 id="pkgTitle">New package</h3>
  <div class="form-grid">
    <input id="pSessions" type="number" min="1" placeholder="Sessions (e.g. 12)">
    <input id="pPrice" type="number" min="0" placeholder="Price EGP">
    <input id="pExpiry" type="date" title="Expiry (optional)" class="full">
    <select id="pMethod" class="full">
      <option value="cash">Paid — Cash</option>
      <option value="instapay">Paid — InstaPay</option>
      <option value="unpaid">Not paid yet</option>
    </select>
  </div>
  <button class="btn" id="btnSavePkg">Save package</button>
  <button class="btn btn-ghost" style="margin-top:8px" onclick="dlgPkg.close()">Cancel</button>
  <p class="err" id="pkgErr"></p>
</dialog>

<!-- MANAGE PACKAGES -->
<dialog id="dlgManage">
  <h3 id="manageTitle">Packages</h3>
  <div id="manageList" style="max-height:50vh;overflow:auto"></div>
  <button class="btn btn-ghost" style="margin-top:12px" onclick="dlgManage.close()">Close</button>
</dialog>

<script>
/* ====== CONFIG — same two values as checkin.html ====== */
const SUPABASE_URL = "https://gndbfxwjcumkftbultkt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_e2x7PPQQ4iO71ZoyyZk_6A_b_FLKIdu";
/* ====================================================== */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const show = (el,on=true)=>el.classList.toggle('hidden',!on);
let clients = [], packages = [], attendance = [], pkgClientId = null;

/* ---------- auth ---------- */
async function init(){
  const { data:{ session } } = await db.auth.getSession();
  if (session) enter(); 
}
$('btnLogin').onclick = async ()=>{
  $('loginErr').textContent='';
  const { error } = await db.auth.signInWithPassword({ email:$('email').value, password:$('password').value });
  if (error) { $('loginErr').textContent = 'Sign-in failed. Check email and password.'; return; }
  enter();
};
$('btnLogout').onclick = async ()=>{ await db.auth.signOut(); location.reload(); };

function enter(){
  $('viewLogin').classList.add('hidden');
  $('viewDash').classList.remove('hidden');
  loadAll();
  setInterval(loadAll, 30000); // refresh every 30s during sessions
}

/* ---------- data ---------- */
async function loadAll(){
  const [c,p,a] = await Promise.all([
    db.from('kraft_clients').select('*').order('full_name'),
    db.from('kraft_packages').select('*'),
    db.from('kraft_attendance').select('*').order('checked_in_at',{ascending:false}).limit(1500),
  ]);
  clients = c.data||[]; packages = p.data||[]; attendance = a.data||[];
  render();
}

function remainingFor(clientId){
  const pkgs = packages.filter(p=>p.client_id===clientId);
  const used = id => attendance.filter(a=>a.package_id===id).length;
  return pkgs.reduce((s,p)=> s + Math.max(0, p.sessions_total - used(p.id)), 0);
}
function lastSeen(clientId){
  const a = attendance.find(x=>x.client_id===clientId);
  return a ? new Date(a.checked_in_at) : null;
}
const dayFmt = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const timeFmt = d => d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

/* ---------- render ---------- */
function render(){
  const todayStr = new Date().toDateString();
  const today = attendance.filter(a=> new Date(a.checked_in_at).toDateString()===todayStr);

  $('statToday').textContent = today.length;
  $('statDebt').textContent  = attendance.filter(a=>a.is_debt).length;

  // today table
  const tb = $('todayBody'); tb.innerHTML='';
  if (!today.length) tb.innerHTML='<tr><td colspan="5" class="muted">No check-ins yet today.</td></tr>';
  today.forEach(a=>{
    const c = clients.find(x=>x.id===a.client_id);
    tb.insertAdjacentHTML('beforeend', `<tr>
      <td>${c?c.full_name:'—'}</td>
      <td class="muted">${timeFmt(new Date(a.checked_in_at))}</td>
      <td class="muted hide-sm">${a.method==='qr'?'QR':'Coach'}</td>
      <td>${a.is_debt?'<span class="tag tag-debt">debt</span>':''}</td>
      <td style="text-align:right"><button class="btn btn-sm btn-ghost" title="Remove this check-in" onclick="deleteAttendance('${a.id}','${c?c.full_name.replace(/'/g,"\\'"):''}')">✕</button></td>
    </tr>`);
  });

  // clients table
  const q = ($('search').value||'').toLowerCase();
  const cb = $('clientsBody'); cb.innerHTML='';
  let lowCount = 0;
  // pending approvals
  const pending = clients.filter(c=>c.status==='pending');
  show($('pendingWrap'), pending.length>0);
  const pb = $('pendingBody'); pb.innerHTML='';
  pending.forEach(c=>{
    pb.insertAdjacentHTML('beforeend', `<tr>
      <td>${c.full_name}</td>
      <td class="muted">${c.phone}</td>
      <td class="muted hide-sm">${dayFmt(new Date(c.created_at))}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm" onclick="approveClient('${c.id}')">Approve</button>
        <button class="btn btn-sm btn-ghost" onclick="rejectClient('${c.id}','${c.full_name.replace(/'/g,"\\'")}')">Reject</button>
      </div></td>
    </tr>`);
  });

  clients.filter(c=>c.status==='active' || (c.active && !c.status))
    .filter(c=> !q || c.full_name.toLowerCase().includes(q) || c.phone.includes(q))
    .forEach(c=>{
      const rem = remainingFor(c.id);
      const seen = lastSeen(c.id);
      const daysAway = seen ? Math.floor((Date.now()-seen)/864e5) : null;
      const hasDebt = attendance.some(a=>a.client_id===c.id && a.is_debt);
      if (rem>0 && rem<=2) lowCount++;
      const flags = [
        hasDebt ? '<span class="tag tag-debt">debt</span>' : '',
        (rem>0 && rem<=2) ? '<span class="tag tag-low">'+rem+' left</span>' : '',
        (daysAway!==null && daysAway>=10) ? '<span class="tag tag-away">'+daysAway+'d away</span>' : '',
        c.client_type==='home' ? '<span class="tag tag-home">home</span>' : '',
      ].join(' ');
      cb.insertAdjacentHTML('beforeend', `<tr>
        <td>${c.full_name}<div class="muted">${c.phone}</div></td>
        <td><span class="remain ${rem===0?'zero':''}">${rem}</span></td>
        <td class="muted hide-sm">${seen?dayFmt(seen):'never'}</td>
        <td>${flags}</td>
        <td><div class="row-actions">
          <button class="btn btn-sm" onclick="openPkg('${c.id}')">+ Package</button>
          <button class="btn btn-sm btn-ghost" onclick="logSession('${c.id}')">Log session</button>
          <button class="btn btn-sm btn-ghost" onclick="openManage('${c.id}')">Packages</button>
          <button class="btn btn-sm btn-ghost" title="Remove client" onclick="removeClient('${c.id}','${c.full_name.replace(/'/g,"\\'")}')">✕</button>
        </div></td>
      </tr>`);
    });
  $('statLow').textContent = lowCount;
}
$('search').oninput = render;

/* ---------- add client ---------- */
$('btnAddClient').onclick = ()=>{ $('clientErr').textContent=''; dlgClient.showModal(); };
$('btnSaveClient').onclick = async ()=>{
  const name = $('cName').value.trim();
  const phone = $('cPhone').value.replace(/\D/g,'');
  if (!name || !/^01\d{9}$/.test(phone)) { $('clientErr').textContent='Name + valid 11-digit phone required.'; return; }
  const { error } = await db.from('kraft_clients').insert({ full_name:name, phone, client_type:$('cType').value, status:'active' });
  if (error){ $('clientErr').textContent = error.code==='23505' ? 'Phone already registered.' : 'Could not save.'; return; }
  $('cName').value=''; $('cPhone').value='';
  dlgClient.close(); loadAll();
};

/* ---------- new package + payment ---------- */
function openPkg(clientId){
  pkgClientId = clientId;
  const c = clients.find(x=>x.id===clientId);
  $('pkgTitle').textContent = 'New package — ' + (c?c.full_name.split(' ')[0]:'');
  $('pkgErr').textContent='';
  const d = new Date(); d.setDate(d.getDate()+30);
  $('pExpiry').value = d.toISOString().slice(0,10); // 30-day validity, editable
  dlgPkg.showModal();
}
$('btnSavePkg').onclick = async ()=>{
  const sessions = parseInt($('pSessions').value), price = parseFloat($('pPrice').value)||0;
  if (!sessions || sessions<1){ $('pkgErr').textContent='Enter the number of sessions.'; return; }
  const { data:pkg, error } = await db.from('kraft_packages').insert({
    client_id: pkgClientId, sessions_total: sessions, price_egp: price,
    expiry_date: $('pExpiry').value || null
  }).select().single();
  if (error){ $('pkgErr').textContent='Could not save package.'; return; }
  const method = $('pMethod').value;
  if (method!=='unpaid' && price>0){
    await db.from('kraft_payments').insert({ client_id:pkgClientId, package_id:pkg.id, amount_egp:price, method });
  }
  $('pSessions').value=''; $('pPrice').value=''; $('pExpiry').value='';
  dlgPkg.close(); loadAll();
};

/* ---------- manual session (home clients / QR fallback) ---------- */
async function logSession(clientId){
  const cl = clients.find(x=>x.id===clientId);
  if (!confirm('Log a session for ' + (cl?cl.full_name:'this client') + '? This deducts 1 from their package.')) return;
  // attach to the newest package with sessions remaining, else debt
  const pkgs = packages.filter(p=>p.client_id===clientId)
    .sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  const used = id => attendance.filter(a=>a.package_id===id).length;
  const open = pkgs.find(p=> p.sessions_total - used(p.id) > 0);
  await db.from('kraft_attendance').insert({
    client_id: clientId, package_id: open?open.id:null, method:'coach', is_debt: !open
  });
  loadAll();
}

async function approveClient(id){
  await db.from('kraft_clients').update({ status:'active' }).eq('id', id);
  await loadAll();
  openPkg(id); // straight into setting up their first package
}
async function rejectClient(id, name){
  if (!confirm('Reject and delete the registration of ' + name + '?')) return;
  await db.from('kraft_clients').delete().eq('id', id);
  loadAll();
}
async function removeClient(id, name){
  if (!confirm('Remove ' + name + ' completely? This deletes their packages, payments and attendance history. This cannot be undone.')) return;
  if (!confirm('Final confirmation — delete ' + name + ' and all their history?')) return;
  await db.from('kraft_clients').delete().eq('id', id);
  loadAll();
}
function openManage(clientId){
  const c = clients.find(x=>x.id===clientId);
  $('manageTitle').textContent = 'Packages — ' + (c?c.full_name:'');
  const used = id => attendance.filter(a=>a.package_id===id).length;
  const pkgs = packages.filter(p=>p.client_id===clientId)
    .sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  const box = $('manageList');
  box.innerHTML = pkgs.length ? '' : '<p class="muted">No packages yet.</p>';
  pkgs.forEach(p=>{
    const u = used(p.id), rem = Math.max(0, p.sessions_total - u);
    box.insertAdjacentHTML('beforeend', `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)">
        <div>
          <div><span class="remain ${rem===0?'zero':''}">${rem}</span> <span class="muted">/ ${p.sessions_total} left</span></div>
          <div class="muted">${p.price_egp>0 ? p.price_egp+' EGP · ' : ''}${p.start_date}${p.expiry_date?' → '+p.expiry_date:''}</div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="deletePackage('${p.id}', ${u})">Delete</button>
      </div>`);
  });
  dlgManage.showModal();
}
async function deletePackage(id, usedCount){
  const warn = usedCount>0
    ? 'This package has ' + usedCount + ' logged sessions attached. Deleting it keeps the attendance records but detaches them. Delete package?'
    : 'Delete this package?';
  if (!confirm(warn)) return;
  await db.from('kraft_packages').delete().eq('id', id);
  await loadAll();
  dlgManage.close();
}

async function deleteAttendance(id, name){
  if (!confirm('Remove this check-in' + (name?(' for '+name):'') + '? The session returns to the package.')) return;
  await db.from('kraft_attendance').delete().eq('id', id);
  loadAll();
}

init();
</script>
</body>
</html>
