<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>KRAFT — Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0a0b; --panel:#131316; --line:#232329;
    --gold:#d4e96c; --gold-soft:rgba(212,233,108,.10);
    --text:#f2f2f0; --muted:#87878f;
    --ok:#7fae7a; --warn:#c96f5e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:radial-gradient(1100px 520px at 50% -8%, #16161a 0%, var(--bg) 60%) fixed, var(--bg); color:var(--text);
    font-family:'Cairo','Poppins',sans-serif;
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
  }
  html[lang=en] body{font-family:'Poppins','Cairo',sans-serif}
  .lang-toggle{
    position:fixed; top:16px; inset-inline-end:16px;
    display:flex; border:1px solid var(--line); border-radius:20px; overflow:hidden;
  }
  .lang-toggle button{
    background:transparent; border:none; color:var(--muted);
    font-family:'Poppins',sans-serif; font-size:.75rem; letter-spacing:.05em;
    padding:6px 14px; cursor:pointer;
  }
  .lang-toggle button.on{background:var(--gold); color:#0a0a0b; font-weight:600}
  .wordmark{
    font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em; font-weight:600; letter-spacing:.35em;
    color:var(--gold); font-size:1.35rem; text-transform:uppercase;
    margin-bottom:6px;
  }
  .tagline{color:var(--muted); font-size:.78rem; letter-spacing:.08em; margin-bottom:44px; text-align:center}
  .card{
    width:100%; max-width:380px; background:var(--panel);
    border:1px solid var(--line); border-radius:18px; padding:32px 26px;
    text-align:center;
  }
  h1{font-size:1.15rem; font-weight:600; margin-bottom:6px}
  .sub{color:var(--muted); font-size:.85rem; margin-bottom:26px}
  input[type=tel]{
    width:100%; padding:15px 16px; border-radius:12px;
    border:1px solid var(--line); background:var(--bg); color:var(--text);
    font-family:inherit; font-size:1.15rem; text-align:center;
    letter-spacing:.12em; direction:ltr; outline:none;
    transition:border-color .2s;
  }
  input[type=tel]:focus{border-color:var(--gold)}
  button.action{
    width:100%; margin-top:16px; padding:15px;
    border:none; border-radius:12px; cursor:pointer;
    background:var(--gold); color:#0a0a0b;
    font-family:inherit; font-size:1.02rem; font-weight:700;
    transition:opacity .2s;
  }
  button.action:disabled{opacity:.45; cursor:default}
  .ghost{background:transparent !important; border:1px solid var(--line) !important; color:var(--muted) !important; font-weight:400 !important}
  .msg{margin-top:18px; font-size:.9rem; min-height:1.4em}
  .msg.err{color:var(--warn)}
  .counter{
    font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.06em; font-size:5.2rem; line-height:1;
    color:var(--gold); margin:18px 0 4px;
  }
  .counter-label{color:var(--muted); font-size:.85rem; letter-spacing:.05em}
  .greet{font-size:1.25rem; font-weight:600; margin-bottom:2px}
  .status-ok{color:var(--ok); font-size:.9rem; margin-top:20px}
  .status-debt{
    margin-top:20px; padding:12px 14px; border-radius:10px;
    background:rgba(201,111,94,.12); border:1px solid rgba(201,111,94,.35);
    color:var(--warn); font-size:.86rem; line-height:1.6;
  }
  .low{color:var(--warn)}
  .spinner{
    width:26px;height:26px;border:3px solid var(--line);
    border-top-color:var(--gold);border-radius:50%;
    margin:14px auto 0;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spinner{animation-duration:2s}}
  button.register{
    background:transparent; color:var(--gold);
    border:1.5px solid var(--gold);
    font-weight:600;
  }
  button.register:active{background:rgba(212,233,108,.08)}
  .renew{
    margin-top:26px; padding:20px 18px 16px; border-radius:14px;
    background:linear-gradient(180deg, rgba(212,233,108,.05), rgba(212,233,108,.015));
    border:1px solid rgba(212,233,108,.22); text-align:center;
  }
  .renew-line{width:26px;height:2px;background:var(--gold);margin:0 auto 14px;border-radius:2px}
  .renew-title{font-weight:600;font-size:.98rem;margin-bottom:4px}
  .renew-body{color:var(--muted);font-size:.84rem;margin-bottom:16px;line-height:1.6}
  .renew-pay{
    display:flex;flex-direction:column;gap:2px;align-items:center;width:100%;
    padding:13px;border-radius:12px;cursor:pointer;
    background:var(--bg);border:1px solid rgba(212,233,108,.35);
    font-family:inherit;transition:border-color .2s;
  }
  .renew-pay:active{border-color:var(--gold)}
  .renew-pay-label{color:var(--gold);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;font-weight:600}
  .renew-pay-number{color:var(--text);font-size:1.35rem;letter-spacing:.14em;font-weight:600;direction:ltr}
  .renew-hint{color:var(--muted);font-size:.72rem;margin-top:10px;min-height:1em}
  .hist-valid{color:var(--gold);font-size:.8rem;margin-top:8px;letter-spacing:.03em}
  .hist-list{margin:20px 0 4px;max-height:34vh;overflow:auto;text-align:start}
  .hist-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 4px;border-bottom:1px solid var(--line);
    font-size:.88rem;
  }
  .hist-row:last-child{border-bottom:none}
  .hist-row .n{color:var(--muted);font-size:.75rem}
  .hist-rule{
    color:var(--muted);font-size:.74rem;line-height:1.7;margin-top:14px;
    padding-top:14px;border-top:1px solid var(--line);
  }
  .hidden{display:none}
  footer{margin-top:36px;color:var(--muted);font-size:.7rem;letter-spacing:.15em;font-family:'Poppins',sans-serif}
</style>
</head>
<body>

<div class="lang-toggle">
  <button id="langAr" class="on">عربي</button>
  <button id="langEn">EN</button>
</div>

<img src="./logo.png" alt="KRAFT" style="height:34px;margin-bottom:10px">
<div class="tagline">Fix the root cause. Build the body. Perform for life.</div>

<div class="card">

  <!-- STEP 1: phone -->
  <div id="stepPhone">
    <h1 data-i18n="title"></h1>
    <p class="sub" data-i18n="subtitle"></p>
    <input type="tel" id="phone" inputmode="numeric" placeholder="01XXXXXXXXX" maxlength="11" autocomplete="tel">
    <button class="action" id="btnLookup" data-i18n="continue"></button>
    <button class="action register" id="btnRegister" data-i18n="registerBtn"></button>
    <p class="msg" id="msgPhone"></p>
  </div>

  <!-- STEP 2: confirm -->
  <div id="stepConfirm" class="hidden">
    <p class="greet" id="confirmName"></p>
    <p class="sub" id="confirmInfo"></p>
    <button class="action" id="btnCheckin" data-i18n="confirm"></button>
    <button class="action ghost" id="btnHist1" data-i18n="histBtn"></button>
    <button class="action ghost" id="btnBack" data-i18n="notMe"></button>
    <p class="msg" id="msgConfirm"></p>
  </div>

  <!-- STEP R: register -->
  <div id="stepReg" class="hidden">
    <h1 data-i18n="regTitle"></h1>
    <p class="sub" data-i18n="regSub"></p>
    <input type="text" id="regName" data-i18n-ph="namePh" autocomplete="name" style="width:100%;padding:15px 16px;border-radius:12px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-family:inherit;font-size:1.05rem;text-align:center;outline:none;margin-bottom:4px">
    <button class="action" id="btnRegSend" data-i18n="regSend"></button>
    <button class="action ghost" id="btnRegBack" data-i18n="notMe"></button>
    <p class="msg" id="msgReg"></p>
  </div>

  <!-- STEP R2: registered -->
  <div id="stepRegDone" class="hidden">
    <p class="greet" data-i18n="regDone"></p>
    <p class="sub" data-i18n="regDoneSub" style="margin-top:10px;line-height:1.7"></p>
  </div>

  <!-- STEP 3: done -->
  <div id="stepDone" class="hidden">
    <p class="greet" id="doneName"></p>
    <div id="doneCounterWrap">
      <div class="counter" id="doneCounter">0</div>
      <div class="counter-label" data-i18n="remainingLabel"></div>
    </div>
    <p class="status-ok hidden" id="doneOk"></p>
    <div class="status-debt hidden" id="doneDebt"></div>

    <button class="action ghost" id="btnHist2" data-i18n="histBtn" style="margin-top:22px"></button>

    <div class="renew hidden" id="renewCard">
      <div class="renew-line"></div>
      <p class="renew-title" id="renewTitle"></p>
      <p class="renew-body" id="renewBody"></p>
      <button class="renew-pay" id="renewPay">
        <span class="renew-pay-label">InstaPay</span>
        <span class="renew-pay-number">01501545118</span>
      </button>
      <p class="renew-hint" id="renewHint"></p>
    </div>
  </div>

  <!-- STEP H: my attendance -->
  <div id="stepHist" class="hidden">
    <h1 data-i18n="histTitle"></h1>
    <div class="hist-summary">
      <div class="counter" id="histRemaining" style="font-size:3.4rem;margin:10px 0 2px">0</div>
      <div class="counter-label" id="histOf"></div>
      <div class="hist-valid" id="histValid"></div>
    </div>
    <div class="hist-list" id="histList"></div>
    <p class="hist-rule" data-i18n="histRule"></p>
    <button class="action ghost" id="btnHistBack" data-i18n="histBack"></button>
  </div>

  <div class="spinner hidden" id="spin"></div>
</div>

<footer>KRAFT FITNESS · GANAKLIS, ALEXANDRIA</footer>

<script>
/* ====== CONFIG — fill these two values from Supabase → Settings → API ====== */
const SUPABASE_URL = "https://gndbfxwjcumkftbultkt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_e2x7PPQQ4iO71ZoyyZk_6A_b_FLKIdu";
/* =========================================================================== */

/* ---------- translations ---------- */
const T = {
  ar: {
    title:'تسجيل الحضور',
    subtitle:'اكتب رقم موبايلك المسجّل عندنا',
    continue:'متابعة',
    confirm:'تأكيد الحضور',
    notMe:'مش أنا — رجوع',
    remainingLabel:'حصص متبقية في باقتك',
    hello:n=>'أهلاً، '+n,
    remainingInfo:r=>'باقتك فيها '+r+' حصص متبقية',
    expiredInfo:'باقتك منتهية — هنسجّل حضورك النهارده وتقدر تجدد مع فريق KRAFT أو عن طريق InstaPay',
    alreadyToday:'إنت مسجّل حضورك النهارده بالفعل ✓',
    checkedOk:'✓ تم تسجيل حضورك — تمرين موفق',
    debtMsg:'باقتك اكتملت — حضور النهارده متسجّل. للتجديد: فريق KRAFT في الجيم أو InstaPay.',
    invalidPhone:'اكتب رقم صحيح مكوّن من 11 رقم',
    notFound:'الرقم مش مسجّل عندنا',
    connErr:'حصلت مشكلة في الاتصال — جرّب تاني',
    genErr:'حصلت مشكلة — كلّم فريق KRAFT',
    registerBtn:'أول مرة؟ سجّل معانا',
    regTitle:'تسجيل جديد',
    regSub:'اكتب اسمك بالكامل وهيتم تفعيل حسابك من فريق KRAFT',
    namePh:'الاسم بالكامل',
    regSend:'إرسال التسجيل',
    regDone:'تم استلام تسجيلك ✓',
    regDoneSub:'فريق KRAFT هيفعّل حسابك ويظبط باقتك — أهلاً بيك في KRAFT',
    regExists:'الرقم ده مسجّل بالفعل',
    regInvalid:'اكتب الاسم بالكامل ورقم صحيح',
    pendingMsg:'تسجيلك واصل ✓ — في انتظار التفعيل من فريق KRAFT',
    renewLast:'دي آخر حصة في باقتك',
    renewOne:'فاضل لك حصة واحدة',
    renewDone:'باقتك اكتملت — حضور النهارده متسجّل',
    renewExpired:'انتهت مدة باقتك (30 يوم) — حضور النهارده متسجّل',
    renewBody:'جدد باقتك عن طريق InstaPay أو كاش في الاستقبال',
    renewCopy:'اضغط على الرقم للنسخ',
    renewCopied:'تم نسخ الرقم ✓',
    histBtn:'سجل حضوري',
    histTitle:'سجل الحضور',
    histRemaining:'حصص متبقية',
    histOf:(r,t)=>r+' من '+t+' حصص',
    histValidUntil:d=>'الباقة صالحة حتى '+d,
    histNoPkg:'لا توجد باقة نشطة حالياً',
    histEmpty:'لا يوجد حضور مسجّل بعد',
    histRule:'الباقة صالحة لمدة 30 يوم من تاريخ الدفع أو حتى انتهاء الحصص — أيهما أقرب.',
    histBack:'رجوع',
  },
  en: {
    title:'Check-in',
    subtitle:'Enter your registered phone number',
    continue:'Continue',
    confirm:'Confirm check-in',
    notMe:'Not me — back',
    remainingLabel:'Sessions left in your package',
    hello:n=>'Hello, '+n,
    remainingInfo:r=>'Your package has '+r+' sessions left',
    expiredInfo:'Your package has ended — today will be logged. Renew with the KRAFT team or via InstaPay.',
    alreadyToday:'You are already checked in today ✓',
    checkedOk:'✓ Checked in — have a great session',
    debtMsg:'Your package is complete — today is logged. To renew: the KRAFT team at the gym, or InstaPay.',
    invalidPhone:'Enter a valid 11-digit number',
    notFound:'This number is not registered yet',
    connErr:'Connection problem — try again',
    genErr:'Something went wrong — please tell the KRAFT team',
    registerBtn:'First time? Register',
    regTitle:'New registration',
    regSub:'Enter your full name — the KRAFT team will activate your account',
    namePh:'Full name',
    regSend:'Send registration',
    regDone:'Registration received ✓',
    regDoneSub:'The KRAFT team will activate your account and set up your package — welcome to KRAFT',
    regExists:'This number is already registered',
    regInvalid:'Enter your full name and a valid number',
    pendingMsg:'Registration received ✓ — awaiting activation by the KRAFT team',
    renewLast:'This was the last session in your package',
    renewOne:'One session left in your package',
    renewDone:'Your package is complete — today is logged',
    renewExpired:'Your package period has ended (30 days) — today is logged',
    renewBody:'Renew via InstaPay, or cash at the front desk',
    renewCopy:'Tap the number to copy',
    renewCopied:'Number copied ✓',
    histBtn:'My attendance',
    histTitle:'My attendance',
    histRemaining:'Sessions remaining',
    histOf:(r,t)=>r+' of '+t+' sessions',
    histValidUntil:d=>'Package valid until '+d,
    histNoPkg:'No active package at the moment',
    histEmpty:'No attendance recorded yet',
    histRule:'Your package is valid for 30 days from the payment date, or until all sessions are used — whichever comes first.',
    histBack:'Back',
  }
};

let lang = localStorage.getItem('kraft_lang') || 'en';
const t = key => T[lang][key];

function applyLang(){
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==='ar') ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = T[lang][el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    el.placeholder = T[lang][el.dataset.i18nPh];
  });
  document.getElementById('langAr').classList.toggle('on', lang==='ar');
  document.getElementById('langEn').classList.toggle('on', lang==='en');
}
document.getElementById('langAr').onclick = ()=>{ lang='ar'; localStorage.setItem('kraft_lang','ar'); applyLang(); };
document.getElementById('langEn').onclick = ()=>{ lang='en'; localStorage.setItem('kraft_lang','en'); applyLang(); };
applyLang();

/* ---------- app ---------- */
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const show = (el,on=true)=>el.classList.toggle('hidden',!on);
let currentPhone = "";

const saved = localStorage.getItem('kraft_phone');
if (saved) $('phone').value = saved;

$('btnLookup').onclick = async () => {
  const phone = $('phone').value.replace(/\D/g,'');
  $('msgPhone').textContent = '';
  if (!/^01\d{9}$/.test(phone)) {
    $('msgPhone').textContent = t('invalidPhone');
    $('msgPhone').className = 'msg err';
    return;
  }
  busy(true, 'btnLookup');
  try {
    const { data, error } = await db.rpc('kraft_lookup', { p_phone: phone });
    if (error) throw error;
    if (!data.found) {
      currentPhone = phone;
      $('msgPhone').textContent = t('notFound');
      $('msgPhone').className = 'msg err';
      return;
    }
    if (data.pending) {
      $('msgPhone').textContent = t('pendingMsg');
      $('msgPhone').className = 'msg';
      return;
    }
    currentPhone = phone;
    localStorage.setItem('kraft_phone', phone);
    $('confirmName').textContent = t('hello')(data.first_name);
    if (data.already_today) {
      $('confirmInfo').textContent = t('alreadyToday');
      $('btnCheckin').classList.add('hidden');
    } else {
      $('confirmInfo').textContent =
        data.remaining > 0 ? t('remainingInfo')(data.remaining) : t('expiredInfo');
      $('btnCheckin').classList.remove('hidden');
    }
    show($('stepPhone'), false);
    show($('stepConfirm'), true);
  } catch(e) {
    $('msgPhone').textContent = t('connErr');
    $('msgPhone').className = 'msg err';
  } finally { busy(false, 'btnLookup'); }
};

$('btnBack').onclick = () => {
  localStorage.removeItem('kraft_phone');
  $('phone').value = '';
  show($('stepConfirm'), false);
  show($('stepPhone'), true);
};

$('btnCheckin').onclick = async () => {
  busy(true, 'btnCheckin');
  try {
    const { data, error } = await db.rpc('kraft_checkin', { p_phone: currentPhone });
    if (error) throw error;
    if (!data.ok) {
      $('msgConfirm').textContent =
        data.reason === 'already_today' ? t('alreadyToday') : t('genErr');
      $('msgConfirm').className = 'msg err';
      return;
    }
    $('doneName').textContent = t('hello')(data.first_name);
    let renewKey = null;
    if (data.debt) {
      show($('doneCounterWrap'), false);
      renewKey = data.expired ? 'renewExpired' : 'renewDone';
    } else {
      $('doneCounter').textContent = data.remaining;
      if (data.remaining <= 2) $('doneCounter').classList.add('low');
      $('doneOk').textContent = t('checkedOk');
      show($('doneOk'), true);
      if (data.remaining === 0) renewKey = 'renewLast';
      else if (data.remaining === 1) renewKey = 'renewOne';
    }
    if (renewKey) {
      $('renewTitle').textContent = t(renewKey);
      $('renewBody').textContent = t('renewBody');
      $('renewHint').textContent = t('renewCopy');
      show($('renewCard'), true);
    }
    show($('stepConfirm'), false);
    show($('stepDone'), true);
  } catch(e) {
    $('msgConfirm').textContent = t('connErr');
    $('msgConfirm').className = 'msg err';
  } finally { busy(false, 'btnCheckin'); }
};

$('btnRegister').onclick = () => {
  const phone = $('phone').value.replace(/\D/g,'');
  if (!/^01\d{9}$/.test(phone)) {
    $('msgPhone').textContent = t('invalidPhone');
    $('msgPhone').className = 'msg err';
    return;
  }
  currentPhone = phone;
  $('msgPhone').textContent='';
  show($('stepPhone'), false);
  show($('stepReg'), true);
  $('msgReg').textContent='';
};
$('btnRegBack').onclick = () => {
  show($('stepReg'), false);
  show($('stepPhone'), true);
  $('btnRegister').classList.add('hidden');
  $('msgPhone').textContent='';
};
$('btnRegSend').onclick = async () => {
  const name = $('regName').value.trim();
  if (name.length < 3) { $('msgReg').textContent = t('regInvalid'); $('msgReg').className='msg err'; return; }
  busy(true,'btnRegSend');
  try {
    const { data, error } = await db.rpc('kraft_register', { p_name: name, p_phone: currentPhone });
    if (error) throw error;
    if (!data.ok) {
      $('msgReg').textContent = data.reason==='exists' ? t('regExists') : t('regInvalid');
      $('msgReg').className='msg err';
      return;
    }
    localStorage.setItem('kraft_phone', currentPhone);
    show($('stepReg'), false);
    show($('stepRegDone'), true);
  } catch(e) {
    $('msgReg').textContent = t('connErr'); $('msgReg').className='msg err';
  } finally { busy(false,'btnRegSend'); }
};

$('renewPay').onclick = async () => {
  try {
    await navigator.clipboard.writeText('01501545118');
    $('renewHint').textContent = t('renewCopied');
    setTimeout(()=>{ $('renewHint').textContent = t('renewCopy'); }, 2500);
  } catch(e) {}
};

let histFrom = 'stepConfirm';
async function openHistory(fromStep){
  histFrom = fromStep;
  busy(true, fromStep==='stepConfirm' ? 'btnHist1' : 'btnHist2');
  try {
    const { data, error } = await db.rpc('kraft_history', { p_phone: currentPhone });
    if (error) throw error;
    if (!data.found) return;
    $('histRemaining').textContent = data.remaining;
    $('histRemaining').classList.toggle('low', data.remaining <= 2);
    $('histOf').textContent = data.has_pkg ? t('histOf')(data.remaining, data.total) : t('histNoPkg');
    if (data.has_pkg && data.expiry) {
      const d = new Date(data.expiry+'T12:00:00');
      $('histValid').textContent = t('histValidUntil')(d.toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{day:'numeric',month:'long',year:'numeric'}));
    } else $('histValid').textContent = '';
    const box = $('histList'); box.innerHTML='';
    const dates = data.dates || [];
    if (!dates.length) box.innerHTML = '<p class="msg" style="color:var(--muted)">'+t('histEmpty')+'</p>';
    dates.forEach((ds,i)=>{
      const d = new Date(ds+'T12:00:00');
      box.insertAdjacentHTML('beforeend',
        `<div class="hist-row"><span>${d.toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{weekday:'long',day:'numeric',month:'long'})}</span><span class="n">${dates.length-i}</span></div>`);
    });
    show($(histFrom), false);
    show($('stepHist'), true);
  } catch(e) {} finally { busy(false, fromStep==='stepConfirm' ? 'btnHist1' : 'btnHist2'); }
}
$('btnHist1').onclick = ()=>openHistory('stepConfirm');
$('btnHist2').onclick = ()=>openHistory('stepDone');
$('btnHistBack').onclick = ()=>{ show($('stepHist'), false); show($(histFrom), true); };

function busy(on, btnId){
  show($('spin'), on);
  $(btnId).disabled = on;
}
</script>
</body>
</html>
